root@www2:~# cat /etc/nginx/nginx.conf

#user  nginx;
worker_processes  1;

#error_log  /var/log/nginx/error.log;
#error_log  /var/log/nginx/error.log  notice;
#error_log  /var/log/nginx/error.log  info;

#pid        /var/run/nginx.pid;

include /etc/nginx/modules.conf.d/*.conf;

events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;
    #tcp_nodelay        on;

    #gzip  on;
    #gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    server_tokens off;

    map $args $cache_key_clean {
        default                          $uri$is_args$args;
        ~*fbclid|gclid|utm_.*|_gl|_ga    $uri;
    }

    include /etc/nginx/conf.d/*.conf;
}

# override global parameters e.g. worker_rlimit_nofile
include /etc/nginx/*global_params;

root@www2:~# cat /var/www/vhosts/system/space.utm.my/conf/vhost_nginx.conf
####################
# Cache rules
####################
proxy_cache_valid 200 301 302 86400;   # 1 day for successful and redirect responses
proxy_cache_valid 404 3600;             # 1 hour for 404 errors
proxy_cache_valid any 1800;            # 30 minutes for other responses

# Override cache key to use clean args (strips tracking parameters)
set $cache_uri $uri;
if ($clean_args != "") {
	set $cache_uri "$uri?$clean_args";
}
if ($clean_args = "") {
	set $cache_uri $uri;
}

# Use clean URI for proxy cache key, stripping tracking params
proxy_cache_key "$scheme$request_method$host$cache_key_clean";

####################
# Default rules
####################

# Block known malicious IPs
deny 157.245.150.22;
deny 167.172.87.120;

merge_slashes off;

# For large headers/cookies
fastcgi_buffers 16 32k;
fastcgi_buffer_size 64k;
fastcgi_busy_buffers_size 64k;
fastcgi_temp_file_write_size 256k;

proxy_buffers 16 32k;
proxy_buffer_size 64k;

client_body_buffer_size 128k;

location / {
	try_files $uri $uri/ @wpt_permalinks_fallback;
}

# Block requests containing //
if ($request_uri ~ "//") {
	return 403;
}

location ~* \.(js|jpg|jpeg|gif|png|css|tgz|gz|rar|bz2|doc|pdf|ppt|tar|wav|bmp|rtf|swf|ico|flv|txt|woff|woff2|svg)$ {
	etag on;
	if_modified_since exact;
	add_header Pragma "public";
	add_header Cache-Control "max-age=31536000, public";
	add_header X-Static-File-Cache "active";
	expires 1y;
	access_log off;
	log_not_found off;
}

location ^~ /rb_bf48693ghk {
	access_log off;
	log_not_found off;
}

# PHP-FPM status page
location /status_phpfpm {
        fastcgi_pass unix:/var/www/vhosts/system/space.utm.my/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/status_phpfpm;
        include fastcgi_params;
}